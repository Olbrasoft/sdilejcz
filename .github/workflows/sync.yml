name: sync

on:
  workflow_dispatch:
    inputs:
      batch_size:
        description: "Maximum number of films to upload"
        required: false
        default: "999"
      max_runtime_minutes:
        description: "Stop picking new films after this many minutes"
        required: false
        default: "320"
  schedule:
    - cron: "*/15 * * * *"

concurrency:
  group: sdilejcz-sync
  cancel-in-progress: false

jobs:
  upload-batch:
    name: Upload missing films to Sdilej.cz (${{ matrix.worker }})
    runs-on: ubuntu-latest
    timeout-minutes: 350
    strategy:
      fail-fast: false
      max-parallel: 4
      matrix:
        worker: [1, 2, 3, 4]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: true

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Init log entry
        env:
          BATCH_SIZE: ${{ github.event.inputs.batch_size || '999' }}
          MAX_RUNTIME_MINUTES: ${{ github.event.inputs.max_runtime_minutes || '320' }}
          WORKER_ID: worker-${{ matrix.worker }}-${{ github.run_id }}
        run: |
          mkdir -p state
          touch state/sync.log
          RUN_TS=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          {
            echo ""
            echo "===== run $RUN_TS worker=${WORKER_ID} batch_size=${BATCH_SIZE} max_runtime_minutes=${MAX_RUNTIME_MINUTES} ($RUN_URL) ====="
          } >> state/sync.log

      - name: Run sync batch
        env:
          SDILEJ_EMAIL: ${{ secrets.SDILEJ_EMAIL }}
          SDILEJ_PASSWORD: ${{ secrets.SDILEJ_PASSWORD }}
          CZ_PROXY_URL: ${{ secrets.CZ_PROXY_URL }}
          CZ_PROXY_KEY: ${{ secrets.CZ_PROXY_KEY }}
          BATCH_SIZE: ${{ github.event.inputs.batch_size || '999' }}
          MAX_RUNTIME_MINUTES: ${{ github.event.inputs.max_runtime_minutes || '320' }}
          WORKER_ID: worker-${{ matrix.worker }}-${{ github.run_id }}
          COMMIT_AFTER_EACH_UPLOAD: "true"
        run: python src/sync_batch.py --count "${BATCH_SIZE}" --max-runtime-minutes "${MAX_RUNTIME_MINUTES}" --worker-id "${WORKER_ID}"
